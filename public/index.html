<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- CRITICAL: Add these meta tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  
  <title>WinTap Games</title>
  
  <style>
    /* PREVENT FLASHING/FLICKERING */
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    
    /* CRITICAL: Prevent layout shifts */
    html, body {
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      min-height: 100vh;
      background: #0f172a;
      margin: 0;
      padding: 0;
    }
    
    /* Fix for 100vh issues on mobile */
    .app-container {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      width: 100%;
      position: relative;
      background: #0f172a;
    }
    
    /* Prevent content shifts */
    .home, .dashboard, .games-page, .wallet-page, .profile-page, .leaderboard-page, .auth-container {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      position: relative;
      background: #0f172a;
    }
  </style>
</head>
<body>
  <div id="root" class="app-container"></div>
  
  <script>
    // FIX FOR 100VH ON MOBILE (prevents flashing when scrolling)
    (function() {
      const setVh = () => {
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      };
      
      window.addEventListener('resize', setVh);
      window.addEventListener('orientationchange', setVh);
      setVh();
    })();
  </script>

  <script>
    // Add this script to your index.html or main App component
(function() {
  // Prevent overscroll/bounce effect at the top
  let startY = 0;
  
  document.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
  }, { passive: false });
  
  document.addEventListener('touchmove', function(e) {
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    const touchY = e.touches[0].clientY;
    const isScrollingDown = touchY < startY;
    
    // If at the top and trying to scroll up, prevent it
    if (scrollTop <= 0 && !isScrollingDown) {
      e.preventDefault();
    }
    
    // If at the bottom and trying to scroll down, prevent it
    const scrollHeight = document.documentElement.scrollHeight;
    const clientHeight = document.documentElement.clientHeight;
    if (scrollTop + clientHeight >= scrollHeight && isScrollingDown) {
      e.preventDefault();
    }
  }, { passive: false });
})();
  </script>
</body>
</html>
